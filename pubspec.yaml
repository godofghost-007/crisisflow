name: crisisflow
description: A fully functional Flutter Web emergency coordination prototype for hospitality venues.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_database: ^11.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  timeago: ^3.6.1
  csv: ^6.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  provider: ^6.1.2
  go_router: ^14.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
